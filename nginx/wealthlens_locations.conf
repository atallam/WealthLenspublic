# ═══ Security headers ═══
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ═══ Gzip compression ═══
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
gzip_min_length 256;
gzip_vary on;

# ═══ Static assets (React SPA build) ═══
# Served directly by Nginx — never hits Python
location /assets/ {
    alias /app/frontend/dist/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# ═══ SPA entry point ═══
location / {
    root /app/frontend/dist;
    try_files $uri $uri/ /index.html;
    expires 5m;
    add_header Cache-Control "public, must-revalidate";
}

# ═══ Auth endpoints (strict rate limiting) ═══
location ~ ^/api/auth/(login|register|google) {
    limit_req zone=login burst=3 nodelay;
    limit_req_status 429;

    proxy_pass http://wealthlens_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}

# ═══ Market data endpoints (cached, moderate rate limit) ═══
location ~ ^/api/(mf|stock|etf|forex|prices) {
    limit_req zone=market burst=20 nodelay;

    proxy_pass http://wealthlens_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    # Cache market data responses at Nginx level too
    proxy_cache_valid 200 60s;
}

# ═══ AI endpoint (longer timeout, moderate rate limit) ═══
location /api/ai/ {
    limit_req zone=api burst=5 nodelay;

    proxy_pass http://wealthlens_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
    proxy_read_timeout 30s;
}

# ═══ All other API endpoints ═══
location /api/ {
    limit_req zone=api burst=30 nodelay;

    proxy_pass http://wealthlens_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";

    # File upload limit
    client_max_body_size 10m;
}

# ═══ Health check (no rate limit) ═══
location = /api/health {
    proxy_pass http://wealthlens_backend;
    proxy_http_version 1.1;
    access_log off;
}
