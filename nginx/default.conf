# ╔══════════════════════════════════════════════════════════════════╗
# ║  WealthLens OSS — Nginx Production Config                      ║
# ║  Handles: SSL termination, static caching, rate limiting,      ║
# ║           gzip compression, API proxy, security headers         ║
# ╚══════════════════════════════════════════════════════════════════╝

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;    # 5 logins/min per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;      # 30 API calls/sec per IP
limit_req_zone $binary_remote_addr zone=market:10m rate=10r/s;   # 10 market data calls/sec

upstream wealthlens_backend {
    # Multiple Gunicorn workers behind this upstream
    server app:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # --- For initial setup without SSL (comment out when SSL is ready) ---
    include /etc/nginx/conf.d/wealthlens_locations.conf;
}

